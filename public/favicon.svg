<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo oscuro con bordes redondeados y borde fino -->
  <rect width="32" height="32" rx="8" fill="#0a0a0a" stroke="#262626" stroke-width="1.5"/>
  
  <!-- Texto `{;}` con estilo monospace -->
  <text 
    x="50%" 
    y="18" 
    dominant-baseline="middle" 
    text-anchor="middle" 
    font-family="'Fira Code', 'Courier New', monospace" 
    font-size="14" 
    font-weight="bold" 
    fill="#ffffff"
  >&#123;;&#125;</text>
</svg>